name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        # Strict, reproducible install. The lockfile is Linux-generated to match the runner;
        # see "Updating dependencies" in the README before regenerating it.
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
