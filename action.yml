name: "Gemini code review"
description: "AI code review on pull requests via the Gemini API. Posts inline comments with priority labels and suggestions."
author: "jgunnink"
branding:
  icon: "git-pull-request"
  color: "blue"

inputs:
  gemini_api_key:
    description: "Google AI Studio API key used to call the Gemini API. Pass a secret."
    required: true
  github_token:
    description: "Token used to post review comments. Defaults to the automatic GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  model:
    description: "Gemini model id (e.g. gemini-flash-latest). Overrides the config file."
    required: false
    default: ""
  config_path:
    description: "Path to the repo config file."
    required: false
    default: ".github/gemini-review.yml"

# Composite action: Node 24 runs the TypeScript source directly (native type stripping),
# so there is no build step and no committed bundle. Deps are installed at run time.
runs:
  using: "composite"
  steps:
    - name: Set up Node 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      # Runtime deps are pure JS; npm install (vs strict npm ci) avoids the cross-platform
      # optional-native-dep lockfile mismatch that affects devDeps on Linux runners.
      run: npm install --omit=dev --no-audit --no-fund

    - name: Run review
      shell: bash
      # No working-directory: run from the consumer repo (GITHUB_WORKSPACE) so config
      # paths resolve there. Node resolves node_modules from the script's own dir.
      env:
        INPUT_GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: node "${{ github.action_path }}/src/main.ts"
